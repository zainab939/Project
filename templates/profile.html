<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>

     <link rel="stylesheet" href="/Project/css/main.css">
    <link rel="stylesheet" href="/css/styleProfile.css">

</head>

<body>
    <header class="topBar">
        <h1>Student details</h1>
        <p>Dashboard / students / student details</p>
    </header>
    <div class="card">
        <div class="cover"></div>
        <div class="profile_section">
            <img src="img.jpg" alt="Profile photo">
        </div>
        <div class="name_tags">
            <h2 id="StudentName">John Doe</h2>
            <p class="tag">Social Media Strategies</p>
        </div>
        <div class="info">
            <p><b>Email:</b> john.doe@example.com</p>
            <p><b>Phone:</b> +1 234 567 890</p>
            <p><b>Address:</b> 123 Main Street, City</p>
        </div>
        <div class="button">
            <a href="#" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="#" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            <button>Edit</button>
        </div>
    </div>
</body>
</html>
